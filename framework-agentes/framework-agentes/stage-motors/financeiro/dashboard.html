<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stage Motors — Dashboard Financeiro</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Oswald:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root {
    --preto: #0A0A0A;
    --grafite: #1A1A1A;
    --grafite-2: #262626;
    --prata: #9CA3AF;
    --branco: #F5F5F5;
    --dourado: #C9A84C;
    --dourado-claro: #E6C874;
    --verde: #4ADE80;
    --vermelho: #F87171;
    --amarelo: #FBBF24;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--preto);
    color: var(--branco);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }
  .container { max-width: 1400px; margin: 0 auto; padding: 24px; }

  /* HEADER */
  header { border-bottom: 1px solid var(--dourado); padding-bottom: 20px; margin-bottom: 24px; }
  .header-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 20px; flex-wrap: wrap; }
  .brand h1 { font-family: 'Oswald', sans-serif; font-size: 32px; letter-spacing: 2px; line-height: 1; }
  .brand .sub { font-family: 'Rajdhani', sans-serif; font-size: 12px; letter-spacing: 3px; color: var(--prata); margin-top: 4px; }
  .header-right { text-align: right; }
  .period-label { font-family: 'Oswald', sans-serif; font-size: 20px; color: var(--dourado); letter-spacing: 1px; }
  .meta-text { font-size: 11px; color: var(--prata); margin-top: 4px; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 2px; font-size: 10px; font-weight: 700; letter-spacing: 1.5px; margin-top: 6px; }
  .badge.fechado { background: var(--dourado); color: var(--preto); }
  .badge.parcial { background: var(--amarelo); color: var(--preto); }

  /* PERIOD SELECTOR */
  .period-selector { display: flex; gap: 6px; margin-top: 16px; flex-wrap: wrap; }
  .period-btn {
    background: var(--grafite); color: var(--prata); border: 1px solid var(--grafite-2);
    padding: 8px 16px; font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 700;
    letter-spacing: 1.5px; cursor: pointer; transition: all 0.15s; text-transform: uppercase;
  }
  .period-btn:hover { background: var(--grafite-2); color: var(--branco); }
  .period-btn.active { background: var(--dourado); color: var(--preto); border-color: var(--dourado); }

  /* TABS */
  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--grafite-2); margin-bottom: 24px; }
  .tab {
    background: transparent; color: var(--prata); border: none; padding: 12px 22px;
    font-family: 'Rajdhani', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 1.5px;
    cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; text-transform: uppercase;
  }
  .tab:hover { color: var(--branco); }
  .tab.active { color: var(--dourado); border-bottom-color: var(--dourado); }

  /* KPIs */
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .kpi {
    background: var(--grafite); border: 1px solid var(--grafite-2); padding: 16px;
    border-left: 3px solid var(--dourado); transition: transform 0.15s;
  }
  .kpi:hover { transform: translateY(-2px); }
  .kpi-label { font-size: 10px; color: var(--prata); text-transform: uppercase; letter-spacing: 1.5px; }
  .kpi-value { font-family: 'Oswald', sans-serif; font-size: 26px; color: var(--branco); margin-top: 6px; font-weight: 500; }
  .kpi-value.positive { color: var(--verde); }
  .kpi-value.negative { color: var(--vermelho); }
  .kpi-sub { font-size: 11px; color: var(--prata); margin-top: 4px; display: flex; align-items: center; gap: 6px; }
  .trend { font-weight: 600; font-size: 11px; }
  .trend.up { color: var(--verde); }
  .trend.down { color: var(--vermelho); }
  .trend.flat { color: var(--prata); }

  /* CARDS */
  .card {
    background: var(--grafite); border: 1px solid var(--grafite-2); padding: 20px;
    margin-bottom: 20px;
  }
  .card h3 {
    font-family: 'Oswald', sans-serif; font-size: 14px; letter-spacing: 2px;
    color: var(--dourado); text-transform: uppercase; margin-bottom: 14px;
    padding-bottom: 10px; border-bottom: 1px solid var(--grafite-2);
  }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 900px) { .grid-2 { grid-template-columns: 1fr; } }

  .chart-wrap { position: relative; height: 280px; }
  .chart-wrap.tall { height: 360px; }

  /* TABELAS */
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    text-align: left; font-family: 'Rajdhani', sans-serif; font-size: 11px;
    letter-spacing: 1.5px; color: var(--dourado); padding: 10px 8px;
    border-bottom: 1px solid var(--dourado); text-transform: uppercase; font-weight: 700;
  }
  th.sortable { cursor: pointer; user-select: none; }
  th.sortable:hover { color: var(--dourado-claro); }
  th.sortable::after { content: ' ⇅'; font-size: 10px; opacity: 0.4; }
  th.sort-asc::after { content: ' ↑'; opacity: 1; }
  th.sort-desc::after { content: ' ↓'; opacity: 1; }
  td { padding: 9px 8px; border-bottom: 1px solid var(--grafite-2); }
  tr:hover td { background: var(--grafite-2); }
  .num { text-align: right; font-variant-numeric: tabular-nums; font-family: 'Inter', sans-serif; }
  .pct-pos { color: var(--verde); }
  .pct-neg { color: var(--vermelho); }

  /* DRE TABLE */
  .dre-table td { padding: 8px 10px; }
  .dre-table .row-sub { color: var(--prata); }
  .dre-table .row-key { background: var(--grafite-2); font-weight: 600; }
  .dre-table .row-total { background: rgba(201, 168, 76, 0.15); font-weight: 700; font-size: 14px; border-top: 1px solid var(--dourado); border-bottom: 1px solid var(--dourado); }
  .dre-table .row-result td { padding: 14px 10px; font-size: 15px; }
  .dre-table .row-result.pos { background: rgba(74, 222, 128, 0.1); color: var(--verde); }
  .dre-table .row-result.neg { background: rgba(248, 113, 113, 0.1); color: var(--vermelho); }
  .indent { padding-left: 24px !important; color: var(--prata); font-size: 12px; }
  .indent2 { padding-left: 40px !important; color: var(--prata); font-size: 11px; }

  /* DESPESAS */
  .despesa-cat { margin-bottom: 16px; }
  .despesa-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 14px; background: var(--grafite-2); cursor: pointer;
    border-left: 3px solid var(--dourado);
  }
  .despesa-header:hover { background: #333; }
  .despesa-header .nome { font-family: 'Rajdhani', sans-serif; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; font-size: 13px; }
  .despesa-header .valor { font-weight: 600; }
  .despesa-header .pct { color: var(--dourado); margin-left: 10px; font-size: 11px; }
  .despesa-items { display: none; padding: 8px 14px 8px 30px; background: rgba(0,0,0,0.3); }
  .despesa-items.open { display: block; }
  .despesa-item { display: flex; justify-content: space-between; padding: 4px 0; font-size: 12px; color: var(--prata); border-bottom: 1px dashed var(--grafite-2); }
  .despesa-item:last-child { border-bottom: none; }
  .caret { display: inline-block; transition: transform 0.15s; margin-right: 8px; color: var(--dourado); }
  .caret.open { transform: rotate(90deg); }

  /* INSIGHTS */
  .insights-list { list-style: none; }
  .insights-list li {
    padding: 12px 0 12px 22px; border-bottom: 1px solid var(--grafite-2);
    position: relative; color: var(--branco); font-size: 13px; line-height: 1.6;
  }
  .insights-list li::before { content: '▸'; position: absolute; left: 0; color: var(--dourado); font-weight: 700; }
  .insights-list li:last-child { border-bottom: none; }
  .acao-card { background: rgba(201, 168, 76, 0.08); border: 1px solid var(--dourado); padding: 16px; margin-top: 16px; }
  .acao-card .label { font-family: 'Rajdhani', sans-serif; font-size: 11px; letter-spacing: 2px; color: var(--dourado); margin-bottom: 8px; text-transform: uppercase; }

  /* LOADING / ERROR */
  .loading { text-align: center; padding: 60px; color: var(--prata); }
  .error { background: rgba(248,113,113,0.1); border: 1px solid var(--vermelho); color: var(--vermelho); padding: 16px; }

  /* FOOTER */
  footer {
    margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--grafite-2);
    text-align: center; color: var(--prata); font-size: 11px;
  }
  .gold { color: var(--dourado); }

  /* HIDDEN */
  .hidden { display: none !important; }

  /* EMPTY STATE */
  .empty-state {
    text-align: center; padding: 40px 20px; color: var(--prata);
    background: var(--grafite-2); border: 1px dashed var(--grafite-2);
  }
  .empty-state .icon { font-size: 32px; margin-bottom: 10px; opacity: 0.5; }
</style>
</head>

<script>
// =========================================================
// STATE
// =========================================================
let DATA = null;
let currentPeriod = null;
let currentTab = 'visao';
let sortState = { column: null, dir: 'desc' };
let charts = {};

// =========================================================
// FORMATTERS
// =========================================================
const fmtBRL = (n) => {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL', minimumFractionDigits: 2 }).format(n);
};
const fmtBRLshort = (n) => {
  if (n === null || n === undefined || isNaN(n)) return '—';
  const abs = Math.abs(n);
  const sign = n < 0 ? '-' : '';
  if (abs >= 1e6) return `${sign}R$ ${(abs/1e6).toFixed(2)}M`;
  if (abs >= 1e3) return `${sign}R$ ${(abs/1e3).toFixed(1)}k`;
  return fmtBRL(n);
};
const fmtPct = (n) => {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return n.toFixed(1).replace('.', ',') + '%';
};
const fmtInt = (n) => new Intl.NumberFormat('pt-BR').format(n);
const fmtDate = (iso) => { if (!iso) return '—'; const [y,m,d] = iso.split('-'); return `${d}/${m}/${y}`; };
const periodLabel = (id) => {
  const p = DATA.periodos_disponiveis.find(x => x.id === id);
  return p ? p.label : id;
};

// =========================================================
// LOAD DATA
// =========================================================
async function loadData() {
  // 1) Tenta fetch (via servidor http)
  let loaded = false;
  if (location.protocol !== 'file:') {
    try {
      const res = await fetch('dashboard-data.json?_t=' + Date.now());
      if (res.ok) { DATA = await res.json(); loaded = true; }
    } catch(_){}
  }
  // 2) Fallback: JSON embutido
  if (!loaded) {
    const el = document.getElementById('embedded-data');
    const raw = el ? el.textContent.trim() : '';
    if (!raw) {
      document.getElementById('content').innerHTML = '<div class="error">Sem dados embutidos. Rode <code>python -m http.server 8080</code> na pasta financeiro/.</div>';
      return;
    }
    try { DATA = JSON.parse(raw); }
    catch (err) {
      document.getElementById('content').innerHTML = '<div class="error"><strong>Erro ao parsear JSON embutido:</strong> ' + err.message + '</div>';
      return;
    }
  }
  // 3) Init com captura de erro
  try { init(); }
  catch (err) {
    console.error(err);
    document.getElementById('content').innerHTML = '<div class="error"><strong>Erro ao renderizar:</strong> ' + err.message + '<br><br><pre style="font-size:11px;white-space:pre-wrap;">' + (err.stack || '') + '</pre></div>';
  }
}

function init() {
  currentPeriod = DATA.meta.periodo_atual;
  // Header
  document.getElementById('meta-text').textContent = 'Atualizado em ' + fmtDate(DATA.meta.atualizado_em) + ' • ' + (DATA.meta.fonte || '');
  const badge = document.getElementById('badge');
  badge.textContent = DATA.meta.tipo === 'fechado' ? 'FECHADO' : 'PARCIAL';
  badge.className = 'badge ' + DATA.meta.tipo;
  // Period selector
  const sel = document.getElementById('period-selector');
  sel.innerHTML = DATA.periodos_disponiveis.map(p =>
    `<button class="period-btn ${p.id === currentPeriod ? 'active' : ''}" data-period="${p.id}">${p.label}</button>`
  ).join('');
  sel.querySelectorAll('.period-btn').forEach(btn => btn.addEventListener('click', () => setPeriod(btn.dataset.period)));
  // Tabs
  document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => setTab(t.dataset.tab)));
  render();
}

function setPeriod(id) {
  currentPeriod = id;
  document.querySelectorAll('.period-btn').forEach(b => b.classList.toggle('active', b.dataset.period === id));
  render();
}
function setTab(id) {
  currentTab = id;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === id));
  render();
}

// =========================================================
// HELPERS
// =========================================================
function getPeriodData() { return DATA.dados_por_periodo[currentPeriod]; }
function getPrevPeriod() {
  const idx = DATA.periodos_disponiveis.findIndex(p => p.id === currentPeriod);
  if (idx <= 0) return null;
  const prev = DATA.periodos_disponiveis[idx - 1];
  if (prev.tipo !== 'mensal') return null;
  return DATA.dados_por_periodo[prev.id];
}
function trend(curr, prev) {
  if (prev == null || prev === 0) return { arrow: '', pct: null, cls: 'flat' };
  const diff = ((curr - prev) / Math.abs(prev)) * 100;
  const arrow = diff > 0.5 ? '▲' : diff < -0.5 ? '▼' : '●';
  const cls = diff > 0.5 ? 'up' : diff < -0.5 ? 'down' : 'flat';
  return { arrow, pct: diff, cls };
}
function sumDespesas(desp) { return Object.values(desp).reduce((a, c) => a + (c.total || 0), 0); }
function catLabel(key) {
  return {
    pessoal: 'Pessoal (salários, comissões)',
    pro_labore: 'Pró-labore',
    ocupacao: 'Ocupação (aluguel, segurança)',
    utilidades: 'Utilidades (água, luz, net)',
    marketing: 'Marketing',
    administrativo: 'Administrativo',
    impostos: 'Impostos',
    manutencao: 'Manutenção / garantia',
    veiculos_uso: 'Veículos de uso',
    financeiras: 'Despesas financeiras',
    investimentos: 'Investimentos'
  }[key] || key;
}

// =========================================================
// RENDER
// =========================================================
function render() {
  const p = getPeriodData();
  if (!p) { document.getElementById('content').innerHTML = '<div class="error">Período sem dados</div>'; return; }
  // Update header period label
  document.getElementById('period-label').textContent = periodLabel(currentPeriod).toUpperCase();
  // Destroy charts
  Object.values(charts).forEach(c => c && c.destroy());
  charts = {};
  // Route
  const content = document.getElementById('content');
  if (currentTab === 'visao')     content.innerHTML = renderVisao(p);
  else if (currentTab === 'dre')  content.innerHTML = renderDRE(p);
  else if (currentTab === 'despesas') content.innerHTML = renderDespesas(p);
  else if (currentTab === 'vendas') content.innerHTML = renderVendas(p);
  else if (currentTab === 'estoque') content.innerHTML = renderEstoque(p);
  else if (currentTab === 'fornecedores') content.innerHTML = renderFornecedores(p);
  else if (currentTab === 'historico') content.innerHTML = renderHistorico(p);
  else if (currentTab === 'insights') content.innerHTML = renderInsights(p);
  // Attach charts and handlers after DOM
  setTimeout(() => {
    if (currentTab === 'visao')     drawVisaoCharts(p);
    if (currentTab === 'despesas')  drawDespesasCharts(p);
    if (currentTab === 'vendas')    drawVendasCharts(p);
    if (currentTab === 'estoque')   drawEstoqueCharts(p);
    if (currentTab === 'historico') drawHistoricoCharts(p);
    attachHandlers();
  }, 0);
}

// ------- VISÃO GERAL -------
function renderVisao(p) {
  const prev = getPrevPeriod();
  const kpiCard = (label, value, sub, trendObj, cls) => {
    const t = trendObj || {};
    const trendHtml = t.pct != null ? `<span class="trend ${t.cls}">${t.arrow} ${fmtPct(Math.abs(t.pct))}</span>` : '';
    return `<div class="kpi">
      <div class="kpi-label">${label}</div>
      <div class="kpi-value ${cls||''}">${value}</div>
      <div class="kpi-sub">${sub} ${trendHtml}</div>
    </div>`;
  };
  const despesasTotal = sumDespesas(p.despesas);
  const resultClass = p.resultado >= 0 ? 'positive' : 'negative';

  const kpis = `<div class="kpi-grid">
    ${kpiCard('Receita Bruta', fmtBRLshort(p.receita_bruta), fmtBRL(p.receita_bruta), prev ? trend(p.receita_bruta, prev.receita_bruta) : null)}
    ${kpiCard('Lucro Bruto', fmtBRLshort(p.lucro_bruto), `Margem ${fmtPct(p.margem_bruta_pct)}`, prev ? trend(p.lucro_bruto, prev.lucro_bruto) : null)}
    ${kpiCard('Despesas Oper.', fmtBRLshort(despesasTotal), `${fmtPct(despesasTotal/p.receita_bruta*100)} da receita`, prev ? trend(despesasTotal, sumDespesas(prev.despesas)) : null)}
    ${kpiCard('Resultado', fmtBRLshort(p.resultado), `Margem ${fmtPct(p.margem_liquida_pct)}`, prev ? trend(p.resultado, prev.resultado) : null, resultClass)}
    ${kpiCard('Veículos', fmtInt(p.veiculos_vendidos), `Ticket ${fmtBRLshort(p.receita_venda_veiculos/p.veiculos_vendidos)}`, prev ? trend(p.veiculos_vendidos, prev.veiculos_vendidos) : null)}
    ${kpiCard('Margem/veículo', fmtBRLshort(p.margem_bruta_por_veiculo), 'Lucro bruto por carro', prev ? trend(p.margem_bruta_por_veiculo, prev.margem_bruta_por_veiculo) : null)}
  </div>`;

  const charts = `<div class="grid-2">
    <div class="card">
      <h3>Composição do Resultado (Waterfall)</h3>
      <div class="chart-wrap tall"><canvas id="chart-waterfall"></canvas></div>
    </div>
    <div class="card">
      <h3>Top Despesas por Categoria</h3>
      <div class="chart-wrap tall"><canvas id="chart-despesas-top"></canvas></div>
    </div>
  </div>`;

  return kpis + charts;
}

function drawVisaoCharts(p) {
  const despesasTotal = sumDespesas(p.despesas);
  // Waterfall: Receita → CMV → Lucro Bruto → Outras Receitas → Despesas → Resultado
  const wfLabels = ['Receita Bruta', '(−) CMV', 'Lucro Bruto', '(+) Outras Rec.', '(−) Despesas', 'Resultado'];
  const wfBase   = [0, p.lucro_bruto, 0, p.lucro_bruto, p.resultado, 0];
  const wfVal    = [p.receita_bruta, p.cmv, p.lucro_bruto, p.outras_receitas_total || 0, despesasTotal, p.resultado];
  const wfColors = ['#C9A84C', '#F87171', '#C9A84C', '#4ADE80', '#F87171', p.resultado >= 0 ? '#4ADE80' : '#F87171'];

  charts.waterfall = new Chart(document.getElementById('chart-waterfall'), {
    type: 'bar',
    data: {
      labels: wfLabels,
      datasets: [
        { label: 'base', data: wfBase, backgroundColor: 'transparent', stack: 's' },
        { label: 'valor', data: wfVal, backgroundColor: wfColors, stack: 's', borderRadius: 2 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: (ctx) => ctx.datasetIndex === 1 ? fmtBRL(ctx.raw) : null
          },
          filter: (item) => item.datasetIndex === 1,
          backgroundColor: '#1A1A1A', borderColor: '#C9A84C', borderWidth: 1
        }
      },
      scales: {
        x: { ticks: { color: '#9CA3AF', font: { size: 10 } }, grid: { display: false } },
        y: { ticks: { color: '#9CA3AF', callback: (v) => fmtBRLshort(v) }, grid: { color: '#262626' } }
      }
    }
  });

  // Top despesas bar
  const cats = Object.entries(p.despesas).map(([k, v]) => ({ key: k, label: catLabel(k), total: v.total })).sort((a, b) => b.total - a.total);
  charts.despesasTop = new Chart(document.getElementById('chart-despesas-top'), {
    type: 'bar',
    data: {
      labels: cats.map(c => c.label),
      datasets: [{ label: 'R$', data: cats.map(c => c.total), backgroundColor: '#C9A84C', borderRadius: 2 }]
    },
    options: {
      indexAxis: 'y',
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1A1A1A', borderColor: '#C9A84C', borderWidth: 1,
          callbacks: { label: (ctx) => fmtBRL(ctx.raw) + ' (' + fmtPct(ctx.raw/sumDespesas(p.despesas)*100) + ')' }
        }
      },
      scales: {
        x: { ticks: { color: '#9CA3AF', callback: (v) => fmtBRLshort(v) }, grid: { color: '#262626' } },
        y: { ticks: { color: '#9CA3AF', font: { size: 11 } }, grid: { display: false } }
      }
    }
  });
}

// ------- DRE -------
function renderDRE(p) {
  const despesasTotal = sumDespesas(p.despesas);
  const resAntes = p.lucro_bruto + (p.outras_receitas_total || 0) - despesasTotal;
  const row = (label, val, cls = '') => `<tr class="${cls}"><td>${label}</td><td class="num">${fmtBRL(val)}</td></tr>`;
  const sub = (label, val) => `<tr class="row-sub"><td class="indent">${label}</td><td class="num">${fmtBRL(val)}</td></tr>`;

  let despesasRows = '';
  Object.entries(p.despesas).sort((a, b) => b[1].total - a[1].total).forEach(([k, v]) => {
    despesasRows += `<tr class="row-sub"><td class="indent">${catLabel(k)}</td><td class="num">${fmtBRL(-v.total)}</td></tr>`;
  });

  return `
    <div class="card">
      <h3>DRE — ${periodLabel(currentPeriod)}</h3>
      <table class="dre-table">
        <tbody>
          <tr class="row-key"><td>RECEITA BRUTA</td><td class="num">${fmtBRL(p.receita_bruta)}</td></tr>
          ${sub('Venda de veículos', p.receita_venda_veiculos)}
          ${sub('Receita com despachante', p.receita_despachante)}
          <tr><td>(−) Deduções</td><td class="num">${fmtBRL(0)}</td></tr>
          <tr class="row-key"><td>(=) RECEITA LÍQUIDA</td><td class="num">${fmtBRL(p.receita_bruta)}</td></tr>
          <tr><td>(−) CMV</td><td class="num">${fmtBRL(-p.cmv)}</td></tr>
          ${sub('Entrada das mercadorias vendidas', -p.cmv_entrada_mercadorias)}
          ${sub('Custo de lançamentos', -p.cmv_custo_lancamentos)}
          ${sub('Custo com despachante', -p.cmv_custo_despachante)}
          <tr class="row-total"><td>(=) LUCRO BRUTO</td><td class="num">${fmtBRL(p.lucro_bruto)} &nbsp;<span style="color:var(--dourado);font-size:11px;">${fmtPct(p.margem_bruta_pct)}</span></td></tr>
          <tr><td>(+) Outras Receitas</td><td class="num">${fmtBRL(p.outras_receitas_total || 0)}</td></tr>
          <tr><td><strong>(−) Despesas Operacionais</strong></td><td class="num"><strong>${fmtBRL(-despesasTotal)}</strong></td></tr>
          ${despesasRows}
          <tr class="row-result ${resAntes >= 0 ? 'pos' : 'neg'}"><td>(=) RESULTADO DO PERÍODO</td><td class="num">${fmtBRL(resAntes)} &nbsp;<span style="font-size:11px;">${fmtPct(p.margem_liquida_pct)}</span></td></tr>
        </tbody>
      </table>
    </div>
  `;
}

// ------- DESPESAS (drill-down) -------
function renderDespesas(p) {
  const total = sumDespesas(p.despesas);
  const cats = Object.entries(p.despesas).map(([k, v]) => ({ key: k, label: catLabel(k), total: v.total, itens: v.itens })).sort((a, b) => b.total - a.total);

  return `
    <div class="grid-2">
      <div class="card">
        <h3>Distribuição de Despesas</h3>
        <div class="chart-wrap tall"><canvas id="chart-despesas-dist"></canvas></div>
      </div>
      <div class="card">
        <h3>Ranking Detalhado</h3>
        <div class="meta-text" style="margin-bottom:12px;">Clique em uma categoria pra abrir os lançamentos.</div>
        ${cats.map(c => `
          <div class="despesa-cat">
            <div class="despesa-header" data-cat="${c.key}">
              <div><span class="caret">▶</span><span class="nome">${c.label}</span></div>
              <div><span class="valor">${fmtBRL(c.total)}</span><span class="pct">${fmtPct(c.total/total*100)}</span></div>
            </div>
            <div class="despesa-items" data-items="${c.key}">
              ${Object.entries(c.itens).filter(([_,v])=>v>0).sort((a,b)=>b[1]-a[1]).map(([k,v]) =>
                `<div class="despesa-item"><span>${k}</span><span>${fmtBRL(v)}</span></div>`
              ).join('') || '<div class="despesa-item" style="color:var(--prata)">(sem lançamentos)</div>'}
            </div>
          </div>
        `).join('')}
        <div style="margin-top:14px;padding-top:10px;border-top:1px solid var(--dourado);display:flex;justify-content:space-between;font-weight:700;">
          <span>TOTAL</span><span>${fmtBRL(total)}</span>
        </div>
      </div>
    </div>
  `;
}

function drawDespesasCharts(p) {
  const cats = Object.entries(p.despesas).map(([k, v]) => ({ label: catLabel(k), total: v.total })).sort((a, b) => b.total - a.total);
  const palette = ['#C9A84C','#E6C874','#4ADE80','#F87171','#FBBF24','#9CA3AF','#d4a373','#b08968','#8d6e63','#6d4c41','#5d4037'];
  charts.despesasDist = new Chart(document.getElementById('chart-despesas-dist'), {
    type: 'doughnut',
    data: {
      labels: cats.map(c => c.label),
      datasets: [{ data: cats.map(c => c.total), backgroundColor: palette.slice(0, cats.length), borderColor: '#0A0A0A', borderWidth: 2 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '55%',
      plugins: {
        legend: { position: 'bottom', labels: { color: '#9CA3AF', font: { size: 10 }, padding: 8, boxWidth: 12 } },
        tooltip: {
          backgroundColor: '#1A1A1A', borderColor: '#C9A84C', borderWidth: 1,
          callbacks: {
            label: (ctx) => {
              const total = ctx.dataset.data.reduce((a,b)=>a+b,0);
              return `${ctx.label}: ${fmtBRL(ctx.raw)} (${fmtPct(ctx.raw/total*100)})`;
            }
          }
        }
      }
    }
  });
}

// ------- VENDAS -------
function renderVendas(p) {
  const all = DATA.vendas_detalhe || [];
  const filtered = currentPeriod === 'Q1-2026' ? all : all.filter(v => v.data && v.data.startsWith(currentPeriod));
  if (!filtered.length) return '<div class="card"><div class="empty-state"><div class="icon">—</div>Sem vendas no período.</div></div>';
  const receita = filtered.reduce((a,v) => a + v.valor_venda, 0);
  const lucro   = filtered.reduce((a,v) => a + v.lucro, 0);
  const diasMed = filtered.reduce((a,v) => a + v.dias_em_estoque, 0) / filtered.length;
  const ticket  = receita / filtered.length;
  const margemMed = lucro / receita * 100;

  const rows = filtered.slice().sort((a,b) => (a.data||'').localeCompare(b.data||'')).map(v => `
    <tr>
      <td>${fmtDate(v.data)}</td>
      <td>${v.veiculo || '—'}</td>
      <td>${v.ano || ''}</td>
      <td class="num">${fmtBRL(v.valor_compra)}</td>
      <td class="num">${fmtBRL(v.lancamentos)}</td>
      <td class="num">${fmtBRL(v.valor_venda)}</td>
      <td class="num ${v.lucro >= 0 ? 'pct-pos' : 'pct-neg'}">${fmtBRL(v.lucro)}</td>
      <td class="num ${v.margem_pct >= 10 ? 'pct-pos' : v.margem_pct < 0 ? 'pct-neg' : ''}">${fmtPct(v.margem_pct)}</td>
      <td class="num">${v.dias_em_estoque}d</td>
    </tr>`).join('');

  return `
    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-label">Carros vendidos</div><div class="kpi-value">${filtered.length}</div><div class="kpi-sub">no período</div></div>
      <div class="kpi"><div class="kpi-label">Receita total</div><div class="kpi-value">${fmtBRLshort(receita)}</div><div class="kpi-sub">${fmtBRL(receita)}</div></div>
      <div class="kpi"><div class="kpi-label">Lucro bruto</div><div class="kpi-value ${lucro>=0?'positive':'negative'}">${fmtBRLshort(lucro)}</div><div class="kpi-sub">Margem ${fmtPct(margemMed)}</div></div>
      <div class="kpi"><div class="kpi-label">Ticket médio</div><div class="kpi-value">${fmtBRLshort(ticket)}</div><div class="kpi-sub">por carro</div></div>
      <div class="kpi"><div class="kpi-label">Giro médio</div><div class="kpi-value">${diasMed.toFixed(0)}d</div><div class="kpi-sub">dias em estoque</div></div>
    </div>
    <div class="grid-2">
      <div class="card">
        <h3>Margem por Venda</h3>
        <div class="chart-wrap tall"><canvas id="chart-vendas-margem"></canvas></div>
      </div>
      <div class="card">
        <h3>Dias em Estoque × Margem</h3>
        <div class="chart-wrap tall"><canvas id="chart-vendas-scatter"></canvas></div>
      </div>
    </div>
    <div class="card">
      <h3>Detalhe das vendas (${filtered.length})</h3>
      <div style="overflow-x:auto">
      <table>
        <thead><tr>
          <th>Data</th><th>Modelo</th><th>Ano</th>
          <th class="num">Compra</th><th class="num">Lançam.</th><th class="num">Venda</th>
          <th class="num">Lucro</th><th class="num">Margem %</th><th class="num">Dias</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
    </div>
  `;
}

        y: { title: { display: true, text: 'Margem %', color: '#9CA3AF' }, ticks: { color: '#9CA3AF', callback: (v) => v + '%' }, grid: { color: '#262626' } }

// ------- ESTOQUE -------
function renderEstoque(p) {
  const est = DATA.estoque_parado || [];
  if (!est.length) return '<div class="card"><div class="empty-state">Sem dados de estoque.</div></div>';
  const capital = est.reduce((a,e) => a + e.valor_compra, 0);
  const acum_lanc = est.reduce((a,e) => a + (e.lancamentos_ate_agora || 0), 0);
  const criticos = est.filter(e => e.dias_parado >= 180);
  const altos = est.filter(e => e.dias_parado >= 90 && e.dias_parado < 180);
  const medios = est.filter(e => e.dias_parado >= 60 && e.dias_parado < 90);
  const ok = est.filter(e => e.dias_parado < 60);

  const insights = DATA.insights_estoque || [];
  const rows = est.map(e => {
    const spread = e.valor_anuncio - e.valor_compra - (e.lancamentos_ate_agora || 0);
    return `
    <tr>
      <td>${e.veiculo}</td>
      <td>${e.ano || ''}</td>
      <td>${e.placa || ''}</td>
      <td class="num ${e.dias_parado >= 180 ? 'pct-neg' : e.dias_parado >= 90 ? 'pct-neg' : e.dias_parado >= 60 ? 'pct-neg' : ''}">${e.dias_parado}d</td>
      <td class="num">${fmtBRL(e.valor_compra)}</td>
      <td class="num">${fmtBRL(e.lancamentos_ate_agora)}</td>
      <td class="num">${fmtBRL(e.preco_anuncio)}</td>
      <td class="num">${fmtBRL(e.fipe_atual)}</td>
      <td class="num ${spread >= 10000 ? 'pct-pos' : spread < 0 ? 'pct-neg' : ''}">${fmtBRL(spread)}</td>
      <td><span class="trend ${e.dias_parado >= 90 ? 'down' : e.dias_parado >= 60 ? 'flat' : 'up'}">${e.alerta}</span></td>
    </tr>`;
  }).join('');

  return `
    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-label">Carros em estoque</div><div class="kpi-value">${est.length}</div><div class="kpi-sub">posição atual</div></div>
      <div class="kpi"><div class="kpi-label">Capital parado</div><div class="kpi-value">${fmtBRLshort(capital)}</div><div class="kpi-sub">${fmtBRL(capital)}</div></div>
      <div class="kpi"><div class="kpi-label">Lançam. acumulados</div><div class="kpi-value">${fmtBRLshort(acum_lanc)}</div><div class="kpi-sub">gastos até agora</div></div>
      <div class="kpi"><div class="kpi-label">+180 dias</div><div class="kpi-value negative">${criticos.length}</div><div class="kpi-sub">crítico</div></div>
      <div class="kpi"><div class="kpi-label">+90 dias</div><div class="kpi-value negative">${altos.length}</div><div class="kpi-sub">alto</div></div>
      <div class="kpi"><div class="kpi-label">+60 dias</div><div class="kpi-value">${medios.length}</div><div class="kpi-sub">médio</div></div>
    </div>
    <div class="grid-2">
      <div class="card">
        <h3>Distribuição por Faixa de Tempo</h3>
        <div class="chart-wrap"><canvas id="chart-estoque-faixas"></canvas></div>
      </div>
      <div class="card">
        <h3>⚠ Alertas de Estoque</h3>
        <ul class="insights-list">${insights.map(i => `<li>${i}</li>`).join('')}</ul>
      </div>
    </div>
    <div class="card">
      <h3>Inventário completo (${est.length})</h3>
      <div style="overflow-x:auto">
      <table>
        <thead><tr>
          <th>Veículo</th><th>Ano</th><th>Placa</th><th class="num">Dias</th>
          <th class="num">Compra</th><th class="num">Lançam.</th><th class="num">Anúncio</th><th class="num">FIPE</th>
          <th class="num">Spread</th><th>Status</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
    </div>
  `;
}
function drawEstoqueCharts(p) {
  const est = DATA.estoque_parado || [];
  const faixas = { '0-30d': 0, '30-60d': 0, '60-90d': 0, '90-180d': 0, '+180d': 0 };
  const valores = { '0-30d': 0, '30-60d': 0, '60-90d': 0, '90-180d': 0, '+180d': 0 };
  est.forEach(e => {
    let f;
    if (e.dias_parado < 30) f = '0-30d';
    else if (e.dias_parado < 60) f = '30-60d';
    else if (e.dias_parado < 90) f = '60-90d';
    else if (e.dias_parado < 180) f = '90-180d';
    else f = '+180d';
    faixas[f]++;
    valores[f] += e.valor_compra;
  });
  charts.estoqueFaixas = new Chart(document.getElementById('chart-estoque-faixas'), {
    type: 'bar',
    data: {
      labels: Object.keys(faixas),
      datasets: [
        { label: 'Qtd carros', data: Object.values(faixas), backgroundColor: ['#4ADE80','#C9A84C','#FBBF24','#F87171','#991B1B'], yAxisID: 'y' },
        { label: 'Capital parado', type: 'line', data: Object.values(valores), borderColor: '#E6C874', backgroundColor: '#E6C874', yAxisID: 'y1', tension: 0.3, pointRadius: 5 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: '#9CA3AF' } },
        tooltip: {
          backgroundColor: '#1A1A1A', borderColor: '#C9A84C', borderWidth: 1,
          callbacks: { label: (ctx) => ctx.datasetIndex === 0 ? `${ctx.raw} carros` : fmtBRL(ctx.raw) }
        }
      },
      scales: {
        x: { ticks: { color: '#9CA3AF' }, grid: { display: false } },
        y: { ticks: { color: '#9CA3AF' }, grid: { color: '#262626' } },
        y1: { position: 'right', ticks: { color: '#E6C874', callback: (v) => fmtBRLshort(v) }, grid: { display: false } }
      }
    }
  });
}

// ------- FORNECEDORES -------
function renderFornecedores(p) {
  const forn = DATA.top_fornecedores || [];
  if (!forn.length) return '<div class="card"><div class="empty-state">Sem dados de fornecedores.</div></div>';
  const total = forn.reduce((a,f) => a + f.valor_total, 0);
  const rows = forn.map(f => `
    <tr>
      <td>${f.nome}</td>
      <td class="num">${f.qtd}</td>
      <td class="num">${fmtBRL(f.valor_total)}</td>
      <td class="num">${fmtPct(f.valor_total/total*100)}</td>
      <td style="font-size:11px;color:var(--prata)">${(f.carros || []).slice(0,3).join(', ')}${f.carros && f.carros.length > 3 ? '…' : ''}</td>
    </tr>`).join('');
  return `
    <div class="card">
      <h3>Top Fornecedores — Q1 2026</h3>
      <div class="meta-text" style="margin-bottom:14px;">${forn.length} fornecedores distintos • ${fmtBRL(total)} em compras no período.</div>
      <table>
        <thead><tr><th>Fornecedor</th><th class="num">Qtd</th><th class="num">Valor</th><th class="num">% do total</th><th>Veículos</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

// ------- HISTÓRICO -------
function renderHistorico(p) {
  return `
    <div class="card">
      <h3>Evolução Mensal — Receita × Resultado</h3>
      <div class="chart-wrap tall"><canvas id="chart-historico"></canvas></div>
    </div>
    <div class="grid-2">
      <div class="card">
        <h3>Volume de Veículos / Mês</h3>
        <div class="chart-wrap"><canvas id="chart-volume"></canvas></div>
      </div>
      <div class="card">
        <h3>Margem Bruta / Mês</h3>
        <div class="chart-wrap"><canvas id="chart-margem"></canvas></div>
      </div>
    </div>
    <div class="card">
      <h3>Comparativo Mensal</h3>
      ${renderCompareTable()}
    </div>
  `;
}

function renderCompareTable() {
  const meses = DATA.periodos_disponiveis.filter(p => p.tipo === 'mensal');
  const rows = [
    ['Veículos vendidos', (d) => fmtInt(d.veiculos_vendidos)],
    ['Receita bruta', (d) => fmtBRL(d.receita_bruta)],
    ['CMV', (d) => fmtBRL(d.cmv)],
    ['Lucro bruto', (d) => fmtBRL(d.lucro_bruto)],
    ['Margem bruta %', (d) => fmtPct(d.margem_bruta_pct)],
    ['Margem bruta / veículo', (d) => fmtBRL(d.margem_bruta_por_veiculo)],
    ['Despesas operacionais', (d) => fmtBRL(sumDespesas(d.despesas))],
    ['Resultado', (d) => fmtBRL(d.resultado)],
    ['Margem líquida %', (d) => fmtPct(d.margem_liquida_pct)],
  ];
  return `<table><thead><tr><th>Indicador</th>${meses.map(m => `<th class="num">${m.label}</th>`).join('')}</tr></thead>
    <tbody>${rows.map(([label, fn]) => `<tr><td>${label}</td>${meses.map(m => `<td class="num">${fn(DATA.dados_por_periodo[m.id])}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
}

function drawHistoricoCharts() {
  const hist = DATA.historico_mensal;
  const labels = hist.map(h => h.periodo);
  charts.hist = new Chart(document.getElementById('chart-historico'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { type: 'bar', label: 'Receita', data: hist.map(h => h.receita), backgroundColor: '#C9A84C', yAxisID: 'y', borderRadius: 2 },
        { type: 'line', label: 'Resultado', data: hist.map(h => h.lucro_liquido), borderColor: '#4ADE80', backgroundColor: '#4ADE80', tension: 0.3, yAxisID: 'y1', pointRadius: 5 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: '#9CA3AF' } },
        tooltip: { backgroundColor: '#1A1A1A', borderColor: '#C9A84C', borderWidth: 1, callbacks: { label: (ctx) => `${ctx.dataset.label}: ${fmtBRL(ctx.raw)}` } }
      },
      scales: {
        x: { ticks: { color: '#9CA3AF' }, grid: { display: false } },
        y: { ticks: { color: '#9CA3AF', callback: (v) => fmtBRLshort(v) }, grid: { color: '#262626' } },
        y1: { position: 'right', ticks: { color: '#4ADE80', callback: (v) => fmtBRLshort(v) }, grid: { display: false } }
      }
    }
  });

  charts.volume = new Chart(document.getElementById('chart-volume'), {
    type: 'bar',
    data: { labels, datasets: [{ label: 'Veículos', data: hist.map(h => h.veiculos), backgroundColor: '#E6C874', borderRadius: 2 }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { backgroundColor: '#1A1A1A', borderColor: '#C9A84C', borderWidth: 1 } },
      scales: { x: { ticks: { color: '#9CA3AF' }, grid: { display: false } }, y: { ticks: { color: '#9CA3AF' }, grid: { color: '#262626' } } }
    }
  });

  charts.margem = new Chart(document.getElementById('chart-margem'), {
    type: 'line',
    data: { labels, datasets: [{ label: 'Margem bruta', data: hist.map(h => h.margem_bruta), borderColor: '#C9A84C', backgroundColor: 'rgba(201,168,76,0.1)', fill: true, tension: 0.3, pointRadius: 5 }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { backgroundColor: '#1A1A1A', borderColor: '#C9A84C', borderWidth: 1, callbacks: { label: (ctx) => fmtBRL(ctx.raw) } } },
      scales: { x: { ticks: { color: '#9CA3AF' }, grid: { display: false } }, y: { ticks: { color: '#9CA3AF', callback: (v) => fmtBRLshort(v) }, grid: { color: '#262626' } } }
    }
  });
}

// ------- INSIGHTS -------
function renderInsights(p) {
  const ins = (DATA.insights_por_periodo && DATA.insights_por_periodo[currentPeriod]) || [];
  return `
    <div class="card">
      <h3>Insights — ${periodLabel(currentPeriod)}</h3>
      ${ins.length ? `<ul class="insights-list">${ins.map(i => `<li>${i}</li>`).join('')}</ul>` : '<div class="empty-state"><div class="icon">—</div>Sem insights pra este período ainda.</div>'}
    </div>
    ${DATA.acao_sugerida ? `<div class="acao-card"><div class="label">▸ Ação sugerida</div>${DATA.acao_sugerida}</div>` : ''}
  `;
}

// =========================================================
// HANDLERS
// =========================================================
function attachHandlers() {
  // Drill-down despesas
  document.querySelectorAll('.despesa-header').forEach(h => {
    h.addEventListener('click', () => {
      const cat = h.dataset.cat;
      const items = document.querySelector(`[data-items="${cat}"]`);
      const caret = h.querySelector('.caret');
      items.classList.toggle('open');
      caret.classList.toggle('open');
    });
  });
}

// Start
loadData();
</script>
